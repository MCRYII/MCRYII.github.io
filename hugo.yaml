baseURL: 'https://www.mcryii.fun/'
locale: 'zh-cn'
title: 'MCRYII的博客'
theme: 'PaperMod'

params:
  homeInfoParams:
    Title: 欢迎来到MCRYII的博客
    Content: 这里记录我的学习、思考和见闻。
  ShowBreadCrumbs: true
  ShowReadingTime: true
  disableScrollToTop: true
    

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: downloads
      name: 下载
      url: /downloads/
      weight: 40

taxonomies:
  category: categories
  tag: tags

# 👇 新增这部分，让 Hugo 生成 index.json
outputs:
  home:
    - HTML
    - RSS
    - JSON
