baseURL: 'https://www.mcryii.fun/'
locale: 'zh-cn'
title: 'MCRYII的博客'
theme: 'PaperMod'

params:
  homeInfoParams:
    标题: 欢迎来到MCRYII的博客
    Content: 这里记录我的学习、思考和见闻。
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowSearch: true
  搜索: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    threshold: 0.4
    minMatchCharLength: 2

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: downloads
      name: 下载
      url: /downloads/
      weight: 40
    - identifier: search
      name: 搜索
      url: /search/
      weight: 50

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON
