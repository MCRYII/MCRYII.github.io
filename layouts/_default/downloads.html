{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    {{ .Content }}
    
    <h3>📂 可用文件列表</h3>
    {{ range (readDir "static/files") }}
      {{ if .IsDir }}
        <h4>📁 {{ .Name }}</h4>
        <ul>
          {{ $dir := .Name }}
          {{ range (readDir (printf "static/files/%s" $dir)) }}
            <li>
              📄 <a href="{{ $.Site.BaseURL }}files/{{ $dir }}/{{ .Name }}" target="_blank">{{ .Name }}</a> ({{ div .Size 1024 }} KB)
            </li>
          {{ end }}
        </ul>
      {{ end }}
    {{ end }}
  </div>
</article>
{{ end }}
